name: weather_info
description: Project about getting weather information in city

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.16.2 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  #Service locator
  get_it: ^7.2.0
  #BLoC for state management
  flutter_bloc: ^8.0.1
  #Value equality
  equatable: ^2.0.3
  #Functional programming
  dartz: ^0.10.1
  #Remote API
  http: ^0.13.4
  connectivity_plus: ^2.3.2
  #Local cache
  shared_preferences: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  mockito: ^5.2.0


# The following section is specific to Flutter.
flutter:
  uses-material-design: true

